name: Deploy to form.ebright.my

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/deploy-form/apps/form-ebright
            GIT_SSH_COMMAND="ssh -i /home/deploy-form/.ssh/deploy_key" git pull origin main
            docker build -t ebright-form .
            docker stop ebright-form || true
            docker rm ebright-form || true
            docker run -d \
              --name ebright-form \
              --restart unless-stopped \
              -p 3006:3000 \
              ebright-form